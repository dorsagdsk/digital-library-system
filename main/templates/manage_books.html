{% load static %}
<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books (Admin Panel)</title>
    <link rel="stylesheet" href="{% static 'css/manage_books2.css' %}">
</head>
<body>
    <h1>Manage Books</h1>
    <div id="message-container"></div>

    <form id="book-form" enctype="multipart/form-data">
        <input type="hidden" id="book-id" name="book_id">
        <h2>Edit Book</h2>
        <p>To edit a book, select it from the list below.</p>
        <div>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required minlength="3">
        </div>

        <div style="position: relative;">
            <label for="author-name">Author Name:</label>
            <input type="text" id="author-name" placeholder="Type name to search or create author..." autocomplete="off" required>
            <input type="hidden" id="author-id" name="author">
            <div id="author-suggestions"></div>
        </div>

        <div id="new-author-fields">
            <h4>Or create a new author:</h4>
            <div>
                <label for="new_author_first_name">First Name:</label>
                <input type="text" id="new_author_first_name" name="new_author_first_name">
            </div>
            <div>
                <label for="new_author_last_name">Last Name:</label>
                <input type="text" id="new_author_last_name" name="new_author_last_name">
            </div>
        </div>

        <div>
            <label for="genre">Genre (Separate numeric IDs with commas, e.g., 1,3):</label>
            <input type="text" id="genre" name="genre" placeholder="Separate numeric genre IDs with commas (e.g., 1,3)">
        </div>

        <div>
            <label for="publication_date">Publication Date:</label>
            <input type="date" id="publication_date" name="publication_date">
        </div>

        <div>
            <label for="isbn">ISBN:</label>
            <input type="text" id="isbn" name="isbn">
        </div>

        <div>
            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="0.01" min="0.01" required>
        </div>

        <div>
            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="stock" min="0">
        </div>

        <div>
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5" required minlength="10"></textarea>
        </div>

        <div>
            <label for="cover_image">Cover Image (Optional, select to update):</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*">
        </div>

        <div>
            <label for="book_type">Book Type:</label>
            <select id="book_type" name="book_type" required>
                <option value="">Select...</option>
                <option value="ebook">E-book</option>
                <option value="paperback">Paperback</option>
                <option value="hardcover">Hardcover</option>
            </select>
        </div>

        <div>
            <label for="full_file">Full Book File (PDF, select to update):</label>
            <input type="file" id="full_file" name="full_file" accept=".pdf">
        </div>

        <div>
            <label for="sample_file">Sample Book File (PDF, Optional, select to update):</label>
            <input type="file" id="sample_file" name="sample_file" accept=".pdf">
        </div>

        <button type="submit" id="submit-button">Update Book</button>
        <button type="button" id="cancel-edit-button">Cancel Edit</button>
        
    </form>

    <div class="book-list-container">
        <h2>Book List</h2>
        <div id="book-list">
            <p>Loading books...</p>
        </div>
    </div>

    <script src="{% static 'js/manage_books.js' %}"></script>
</body>
</html>
