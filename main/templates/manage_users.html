{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Library Admin</title>
    <link rel="stylesheet" href="{% static 'css/admin_style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <div class="search-bar-group">
                    <input type="text" id="user-search-box" placeholder="Search users...">
                    <button id="user-search-button"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="header-center">
                <h1>
                    <i class="fas fa-book" style="color: #4CAF50;"></i>
                    <img src="{% static 'images/library_icon.png' %}" alt="Library Icon" class="library-icon">
                    Library Admin Panel
                    <img src="{% static 'images/library_icon.png' %}" alt="Library Icon" class="library-icon">
                </h1>
            </div>
            <div class="header-right">
                <button id="logout-button"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </header>

    <div class="sidebar">
        <h3>Admin Panel</h3>
        <ul>
            <li><a href="/admin-dashboard/"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="/add-book"><i class="fas fa-book-medical"></i> Add New Book</a></li>
            <li><a href="/add-author"><i class="fas fa-feather-alt"></i> Add New Author</a></li>
            <li><a href="/manage-books/"><i class="fas fa-book-open"></i> Manage Books</a></li>
            <li><a href="/manage-authors/"><i class="fas fa-users"></i> Manage Authors</a></li>
            <li><a href="/manage-users/" class="active"><i class="fas fa-user-friends"></i> Manage Users</a></li>
            <li><a href="/add-discount-code"><i class="fas fa-tags"></i> Add Discount Code</a></li>
            <li><a href="/view-orders"><i class="fas fa-receipt"></i> View Orders</a></li>
            <li><a href="/view-statistics"><i class="fas fa-chart-line"></i> View Statistics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2>Manage Users</h2>
        <div id="users-management-list">
            <p>Loading users...</p>
        </div>
    </div>

    <script src="{% static 'js/manage_users.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
</body>
</html>
