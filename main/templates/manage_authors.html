{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Authors</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/admin_style.css' %}">
    <style>
        /* Basic styling for the table and buttons - adjust as per your admin_style.css */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        form {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="email"],
        .form-group input[type="tel"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button[type="submit"]:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: none; /* Initially hidden */
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
            display: block;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .action-buttons button {
            padding: 5px 10px;
            margin-right: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .edit-button {
            background-color: #ffc107;
            color: #333;
        }
        .edit-button:hover {
            background-color: #e0a800;
        }
        .delete-button {
            background-color: #dc3545;
            color: white;
        }
        .delete-button:hover {
            background-color: #c82333;
        }
        .cancel-edit-button {
            background-color: #6c757d;
            color: white;
            margin-left: 10px;
        }
        .cancel-edit-button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مدیریت نویسندگان</h1>

        <h2>افزودن/ویرایش نویسنده</h2>
        <form id="addAuthorForm">
            <div class="form-group">
                <label for="authorUsername">نام کاربری:</label>
                <input type="text" id="authorUsername" name="username" required>
                <div id="usernameError" class="validation-error"></div>
            </div>
            <div class="form-group">
                <label for="authorPassword">رمز عبور (اگر در حال ویرایش هستید، برای تغییر رمز عبور وارد کنید):</label>
                <input type="password" id="authorPassword" name="password" minlength="8">
                <div id="passwordError" class="validation-error"></div>
            </div>
            <div class="form-group">
                <label for="authorFirstName">نام:</label>
                <input type="text" id="authorFirstName" name="first_name" required>
                <div id="firstNameError" class="validation-error"></div>
            </div>
            <div class="form-group">
                <label for="authorLastName">نام خانوادگی:</label>
                <input type="text" id="authorLastName" name="last_name" required>
                <div id="lastNameError" class="validation-error"></div>
            </div>
            <div class="form-group">
                <label for="authorEmail">ایمیل (اختیاری):</label>
                <input type="email" id="authorEmail" name="email">
                <div id="emailError" class="validation-error"></div>
            </div>
            <div class="form-group">
                <label for="authorContactNumber">شماره تماس (اختیاری):</label>
                <input type="tel" id="authorContactNumber" name="contact_number">
                <div id="contactNumberError" class="validation-error"></div>
            </div>
            <button type="submit" id="submitAuthorButton">افزودن نویسنده</button>
            <button type="button" id="cancelEditButton" class="cancel-edit-button" style="display: none;">لغو ویرایش</button>
        </form>
        <div id="message" class="message"></div>

        <hr>

        <h2>لیست نویسندگان</h2>
        <table id="authorsTable">
            <thead>
                <tr>
                    <th>نام کاربری</th>
                    <th>نام</th>
                    <th>نام خانوادگی</th>
                    <th>ایمیل</th>
                    <th>شماره تماس</th>
                    <th>تاریخ عضویت</th>
                    <th>نقش</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody id="authorsList">
                <tr><td colspan="8">در حال بارگذاری نویسندگان...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="{% static 'js/manage_authors.js' %}"></script>
</body>
</html>
