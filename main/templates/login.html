{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/login_css.css' %}" />

</head>
<body>
    <div class="dark-overlayy"></div>
    <div class="login-container" dir="ltr">
        <i class="fas fa-user-circle icon"></i>
        <img src="{% static 'image/4qGdq42W.jpg' %}" alt="Moon" class="corner-logo" style="right: 600px; top: 0.5px;" />
        <h1>Login</h1>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            <p>Don't have an account?</p>
            <a href="/register_customer/" class="register-button">Register</a>
        </div>
    </div>


    <script src="{% static 'js/scripts_login.js' %}"></script>
</body>
</html>
