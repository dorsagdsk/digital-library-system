<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Book</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
    input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; }
    button { background: #28a745; color: #fff; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload New Book</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <label>Title:</label>
      <input type="text" name="title" required>

      <label>Description:</label>
      <textarea name="description" required></textarea>

      <label>Book Type:</label>
      <select name="book_type" required>
        <option value="">-- Select Type --</option>
        <option value="ebook">E-Book</option>
        <option value="audiobook">Audiobook</option>
      </select>

      <label>Price:</label>
      <input type="number" name="price" step="0.01" required>

      <label>Genre:</label>
      <select name="genre" multiple required>
        <option value="fiction">Fiction</option>
        <option value="nonfiction">Non-Fiction</option>
        <option value="sci-fi">Sci-Fi</option>
        <option value="history">History</option>
        <!-- ژانرهای دیگه رو خودت اضافه کن -->
      </select>

      <label>Book File (PDF):</label>
      <input type="file" name="file" accept="application/pdf" required>

      <button type="submit">Upload</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('token');
      if (!token) {
        alert("Please login first.");
        window.location.href = '/login/';
        return;
      }

      const formData = new FormData(e.target);
      try {
        const response = await fetch('/api/books/upload/', {
          method: 'POST',
          headers: { 'Authorization': `Token ${token}` },
          body: formData
        });

        const data = await response.json();
        if (response.ok) {
          document.getElementById('message').innerText = "Book uploaded successfully!";
        } else {
          document.getElementById('message').innerText = "Error: " + JSON.stringify(data);
        }
      } catch (err) {
        document.getElementById('message').innerText = "Server error!";
      }
    });
  </script>
</body>
</html>
