{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Form</title>
    <link rel="stylesheet" href="{% static 'css/register1.css' %}">
</head>
<body>
    <div class="dark-overlay"></div>

<div class="container">

    <h2>Customer Registration Form</h2>
    <form id="registrationForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="input-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>
        <div class="input-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>
        <div class="input-group">
            <label for="phone_number">Phone Number</label>
            <input type="text" id="phone_number" name="phone_number" required>
        </div>
        <button type="submit" class="btn">Next Step</button>
        <div id="responseMessage" class="error"></div>
    </form>
    <button type="button" class="btn btn-login" onclick="location.href='/login'">Go to Login</button>

</div>

<script src="{% static 'js/scripts_register.js' %}"></script>

</body>
</html>
