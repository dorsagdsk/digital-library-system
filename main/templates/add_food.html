{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'css/add_food.css' %}">

</head>
<body>
<!-- صفحه فرم اضافه کردن غذا -->
<form id="add-food-form" enctype="multipart/form-data">
    <label for="name">نام غذا:</label>
    <input type="text" id="name" name="name" required><br>

   <label for="category">دسته‌بندی:</label>
<select id="category" name="category" required>
    <option value="فست فود">فست فود</option>
    <option value="نوشیدنی">نوشیدنی</option>
    <option value="غذای ایرانی">غذای ایرانی</option>
    <option value="دسر">دسر</option>
</select><br>


    <label for="description">توضیحات:</label>
    <textarea id="description" name="description" required></textarea><br>

    <label for="price">قیمت:</label>
    <input type="number" id="price" name="price" required><br>

    <label for="image">تصویر غذا:</label>
    <input type="file" id="image" name="image"><br>
    <label for="rating">امتیاز:</label>
        <input type="number" id="rating" name="rating" min="1" max="5"><br><br>

    <button type="submit">اضافه کردن غذا</button>
</form>
    <script src="{% static 'js/add_food.js' %}"></script>

</body>
</html>
